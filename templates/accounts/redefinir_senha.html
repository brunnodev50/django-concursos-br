{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Nova Senha{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="mb-4"><i class="bi bi-shield-lock"></i> Criar Nova Senha</h2>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-success">Salvar Nova Senha</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
