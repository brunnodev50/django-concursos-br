{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Redefinir Senha{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="mb-4"><i class="bi bi-key"></i> Redefinir Senha</h2>
        <p class="text-muted">Informe seu e-mail e escolha como quer receber o link.</p>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-warning">Enviar Link</button>
          </div>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'login' %}">Voltar ao login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
